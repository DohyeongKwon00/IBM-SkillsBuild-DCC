<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CommCopilot</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="app">
        <!-- Start screen -->
        <div id="start-screen">
            <h1>CommCopilot</h1>
            <p>Select one microphone for Speaker A and one for Speaker B.</p>
            <div id="mic-selectors">
                <label>
                    Speaker A microphone
                    <select id="speaker-a-mic-select"></select>
                </label>
                <label>
                    Speaker B microphone
                    <select id="speaker-b-mic-select"></select>
                </label>
                <button id="refresh-mics-btn" type="button">Refresh Mics</button>
            </div>
            <button id="start-btn">Start Session</button>
        </div>

        <!-- Active Session -->
        <div id="session-screen" style="display:none;">
            <div id="status-bar">
                <span id="status-indicator">Listening...</span>
                <button id="end-btn">End Session</button>
            </div>
            <div id="inline-recap" style="display:none;"></div>

            <div class="panel">
                <h3>Live Transcript</h3>
                <div id="live-transcript">
                    <div id="transcript-final"></div>
                </div>
            </div>

            <div class="panel">
                <h3>Suggested Phrases</h3>
                <div id="phrase-container"><span class="phrase-empty">No active suggestions.</span></div>
                <div id="selected-phrase" style="display:none;"></div>
            </div>

            <div class="panel" id="phrase-history-panel">
                <button id="phrase-history-toggle-btn" class="panel-toggle" type="button" aria-expanded="false" aria-controls="phrase-history">
                    <span>Suggested Phrases History</span>
                    <span id="phrase-history-toggle-icon">Show All</span>
                </button>
                <div id="phrase-history"><span class="phrase-history-empty">No suggestions yet.</span></div>
            </div>

            <div class="panel" id="pipeline-log-panel">
                <button id="log-toggle-btn" class="panel-toggle" type="button" aria-expanded="false" aria-controls="log-panel">
                    <span>Pipeline Log</span>
                    <span id="log-toggle-icon">Show</span>
                </button>
                <div id="log-panel" hidden></div>
            </div>
        </div>

        <!-- Error -->
        <div id="error-bar" style="display:none;"></div>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
