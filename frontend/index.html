<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CommCopilot</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="app">
        <!-- Start screen -->
        <div id="start-screen">
            <h1>CommCopilot</h1>
            <p>Press start to begin listening. The assistant will infer context from your conversation.</p>
            <button id="start-btn">Start Session</button>
        </div>

        <!-- Active Session -->
        <div id="session-screen" style="display:none;">
            <div id="status-bar">
                <span id="status-indicator">Listening...</span>
                <button id="end-btn">End Session</button>
            </div>
            <div id="phrase-container"></div>
            <div id="selected-phrase" style="display:none;"></div>
            <div id="inline-recap" style="display:none;"></div>

            <div class="panel">
                <h3>Live Transcript</h3>
                <div id="live-transcript">
                    <div id="transcript-final"></div>
                </div>
            </div>

            <div class="panel">
                <h3>Pipeline Log</h3>
                <div id="log-panel"></div>
            </div>
        </div>

        <!-- Recap -->
        <div id="recap-screen" style="display:none;">
            <h2>Session Recap</h2>
            <div id="recap-content"></div>
            <button id="new-session-btn">New Session</button>
        </div>

        <!-- Error -->
        <div id="error-bar" style="display:none;"></div>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
